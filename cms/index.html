<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS - LUCHRIS TRAVELS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="cms-wrapper">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-area">
                <h2>📊 LUCHRIS CMS</h2>
                <p>Gestor de Productos</p>
            </div>
            <nav class="menu">
                <button class="menu-btn active" data-type="crucero">⛴️ Cruceros</button>
                <button class="menu-btn" data-type="boleto">✈️ Boletos Aéreos</button>
                <button class="menu-btn" data-type="disney">🏰 Paquetes Disney</button>
                <button class="menu-btn" data-type="tour">🌍 Tours</button>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="btn-back">← Volver al sitio</a>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-area">
            <!-- HEADER -->
            <header class="top-bar">
                <h1 id="section-title">Gestión de Cruceros</h1>
                <div class="actions">
                    <input type="text" id="search-box" placeholder="Buscar..." class="search-input">
                    <button id="btn-nuevo" class="btn btn-primary">+ Nuevo</button>
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content-main">
                <div id="items-container" class="items-list">
                    <p class="loading-text">Cargando...</p>
                </div>
            </div>
        </main>

        <!-- MODAL FORM -->
        <div id="modal-form" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Nuevo Producto</h2>
                    <button class="btn-close" id="btn-close-modal">✕</button>
                </div>
                <form id="form-producto" class="form-producto">
                    <div id="form-fields"></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="btn-cancelar">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="cms.js"></script>
</body>
</html>
