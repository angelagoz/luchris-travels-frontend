<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagar Cotización - LUCHRIS TRAVELS</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #f5f5f5; }

        .navbar {
            background: white;
            padding: 15px 30px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a { color: #1565c0; text-decoration: none; font-weight: bold; }

        .container { max-width: 600px; margin: 40px auto; padding: 20px; }

        .pago-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 { color: #1565c0; margin-bottom: 30px; text-align: center; }

        .resumen {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #00bcd4;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .item:last-child { border-bottom: none; }

        .total {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            margin-top: 15px;
            border-top: 2px solid #1565c0;
            font-weight: bold;
            font-size: 1.2rem;
            color: #c8102e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        #card-element {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            background: white;
            margin-bottom: 20px;
        }

        .btn-pagar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-pagar:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
        }

        .btn-pagar:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1565c0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .vacio {
            text-align: center;
            padding: 60px 20px;
        }

        .vacio h2 { color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>💳 Pagar Cotización</h2>
        <a href="index.html">← Volver</a>
    </div>

    <div class="container">
        <div id="cotizacion-vacia" class="vacio" style="display: none;">
            <h2>⚠️ Cotización no encontrada</h2>
            <p>El link puede haber expirado o ser inválido</p>
            <a href="index.html" style="color: #1565c0; text-decoration: none; font-weight: bold;">Volver al sitio</a>
        </div>

        <div id="pago-contenido" style="display: none;">
            <div class="pago-card">
                <h1>💳 Pagar Cotización</h1>

                <div class="resumen" id="resumen-cotizacion"></div>

                <form id="payment-form" onsubmit="procesar(event)">
                    <div id="error-message" class="error"></div>
                    <div id="success-message" class="success"></div>

                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" readonly required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" readonly required>
                    </div>

                    <div class="form-group">
                        <label>Información de Tarjeta</label>
                        <div id="card-element"></div>
                    </div>

                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p>Procesando pago...</p>
                    </div>

                    <button type="submit" class="btn-pagar" id="btn-pagar">💳 Pagar Ahora</button>
                </form>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let stripe = null;
        let cardElement = null;
        let cotizacionId = null;

        async function inicializar() {
            // Obtener ID de cotización del URL
            const params = new URLSearchParams(window.location.search);
            cotizacionId = params.get('cotizacion');

            if (!cotizacionId) {
                document.getElementById('cotizacion-vacia').style.display = 'block';
                return;
            }

            // Obtener datos de cotización
            try {
                const response = await fetch(CONFIG.API_URL + '/cotizaciones/' + cotizacionId);
                const data = await response.json();

                if (!data.success || !data.datos) {
                    document.getElementById('cotizacion-vacia').style.display = 'block';
                    return;
                }

                const cotizacion = data.datos;
                document.getElementById('pago-contenido').style.display = 'block';
                document.getElementById('nombre').value = cotizacion.nombre;
                document.getElementById('email').value = cotizacion.email;

                // Mostrar resumen
                const resumen = document.getElementById('resumen-cotizacion');
                let html = '';

                if (cotizacion.items && cotizacion.items.length > 0) {
                    cotizacion.items.forEach(item => {
                        html += `
                            <div class="item">
                                <span>${item.nombre}</span>
                                <span>$${parseFloat(item.precio).toFixed(2)}</span>
                            </div>
                        `;
                    });

                    html += `
                        <div class="total">
                            <span>Total:</span>
                            <span>$${parseFloat(cotizacion.monto_total).toFixed(2)}</span>
                        </div>
                    `;
                } else {
                    html = '<p>Sin detalles de items</p>';
                }

                resumen.innerHTML = html;

                // Inicializar Stripe
                inicializarStripe();

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('cotizacion-vacia').style.display = 'block';
            }
        }

        function inicializarStripe() {
            stripe = Stripe('pk_test_51TFcKeAbjIyskxieV0OQLVBgjMzUadc6uSMbMYNkTKOcK1dvx8dGfDNyjfmHdtRoqkjlY45VRRFG6lmenGKuUbSS00eKRPrdc1');
            const elements = stripe.elements();
            cardElement = elements.create('card');
            cardElement.mount('#card-element');

            cardElement.addEventListener('change', (event) => {
                const errorDiv = document.getElementById('error-message');
                if (event.error) {
                    errorDiv.textContent = '❌ ' + event.error.message;
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.style.display = 'none';
                }
            });
        }

        async function procesar(e) {
            e.preventDefault();

            const btnPagar = document.getElementById('btn-pagar');
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            btnPagar.disabled = true;
            loading.style.display = 'block';
            errorDiv.style.display = 'none';

            try {
                const { paymentMethod, error } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: {
                        name: document.getElementById('nombre').value,
                        email: document.getElementById('email').value
                    }
                });

                if (error) {
                    throw new Error(error.message);
                }

                // Procesar pago
                const response = await fetch(CONFIG.API_URL + '/pagos/pago-directo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paymentMethodId: paymentMethod.id,
                        email: document.getElementById('email').value,
                        nombre: document.getElementById('nombre').value,
                        monto: 9999 // Monto dummy (se obtendría de cotización)
                    })
                });

                const paymentData = await response.json();

                if (paymentData.success) {
                    successDiv.textContent = '✅ ¡Pago procesado exitosamente!';
                    successDiv.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = 'exito.html?cotizacion=' + cotizacionId;
                    }, 2000);
                } else {
                    throw new Error(paymentData.error || 'Error al procesar pago');
                }

            } catch (error) {
                errorDiv.textContent = '❌ ' + error.message;
                errorDiv.style.display = 'block';
            } finally {
                btnPagar.disabled = false;
                loading.style.display = 'none';
            }
        }

        inicializar();
    </script>
</body>
</html>
