<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago - LUCHRIS TRAVELS</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
        }
        .pago-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .pago-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .pago-header h1 {
            color: #003399;
            margin: 0 0 10px 0;
        }
        .resumen-pago {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #003399;
        }
        .item-pago {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .item-pago:last-child {
            border-bottom: none;
        }
        .total-pago {
            font-size: 20px;
            font-weight: bold;
            color: #c41e3a;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #003399;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        #card-element {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 12px;
            background: white;
        }
        .btn-pagar {
            width: 100%;
            padding: 14px;
            background: #003399;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-pagar:hover {
            background: #002277;
        }
        .btn-pagar:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-message {
            color: #c41e3a;
            margin-top: 10px;
            padding: 10px;
            background: #ffe0e0;
            border-radius: 4px;
            display: none;
        }
        .success-message {
            color: #28a745;
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 4px;
            display: none;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #003399;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="pago-container">
        <div class="pago-header">
            <h1>💳 Pagar Reserva</h1>
            <p>Completa tu pago de forma segura con Stripe</p>
        </div>

        <!-- Resumen -->
        <div class="resumen-pago" id="resumen-pago"></div>

        <!-- Formulario -->
        <form id="payment-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label>Información de Tarjeta</label>
                <div id="card-element"></div>
            </div>

            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Procesando pago...</p>
            </div>

            <button type="submit" class="btn-pagar" id="submit-btn">Pagar Ahora</button>
        </form>
    </div>

    <script>
        const stripe = Stripe('pk_test_51TFcKeAbjIyskxieV0OQLVBgjMzUadc6uSMbMYNkTKOcK1dvx8dGfDNyjfmHdtRoqkjlY45VRRFG6lmenGKuUbSS00eKRPrdc1');
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        // Obtener datos del carrito
        function cargarResumen() {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const resumenDiv = document.getElementById('resumen-pago');

            if (carrito.length === 0) {
                resumenDiv.innerHTML = '<p>No hay items en el carrito</p>';
                return;
            }

            let html = '';
            let total = 0;

            carrito.forEach(item => {
                const subtotal = item.precio_base * (item.cantidad || 1);
                total += subtotal;
                html += `
                    <div class="item-pago">
                        <span>${item.nombre} (x${item.cantidad || 1})</span>
                        <span>$${subtotal.toFixed(2)}</span>
                    </div>
                `;
            });

            html += `
                <div class="total-pago">
                    <span>Total a Pagar:</span>
                    <span>$${total.toFixed(2)}</span>
                </div>
            `;

            resumenDiv.innerHTML = html;
            document.getElementById('total-monto').value = total;
        }

        // Manejar errores de tarjeta
        cardElement.addEventListener('change', (event) => {
            const errorDiv = document.getElementById('error-message');
            if (event.error) {
                errorDiv.textContent = event.error.message;
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });

        // Procesar pago
        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if (carrito.length === 0) {
                alert('El carrito está vacío');
                return;
            }

            const total = carrito.reduce((sum, item) => sum + (item.precio_base * (item.cantidad || 1)), 0);
            const email = document.getElementById('email').value;
            const nombre = document.getElementById('nombre').value;

            const submitBtn = document.getElementById('submit-btn');
            const loading = document.getElementById('loading');
            submitBtn.disabled = true;
            loading.style.display = 'block';

            try {
                // Crear método de pago
                const { paymentMethod, error } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: { name: nombre, email: email }
                });

                if (error) {
                    throw new Error(error.message);
                }

                // Crear sesión de checkout
                const response = await fetch('https://luchris-travels-backend.onrender.com/api/pagos/crear-pago', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        reservaId: 'cotizacion-' + Date.now(),
                        email: email,
                        monto: total
                    })
                });

                const data = await response.json();
                if (!data.success) throw new Error(data.error);

                // Redirigir a Stripe Checkout
                const { error: stripeError } = await stripe.redirectToCheckout({
                    sessionId: data.sessionId
                });

                if (stripeError) throw new Error(stripeError.message);

            } catch (error) {
                const errorDiv = document.getElementById('error-message');
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Cargar resumen al abrir
        cargarResumen();
    </script>
</body>
</html>
